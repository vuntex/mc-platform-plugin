backend:
  # Base URL of the Spring Boot economy backend. No trailing slash.
  base-url: http://localhost:8080
  # Connection + per-request timeouts (milliseconds).
  connect-timeout-ms: 5000
  request-timeout-ms: 5000
  # Extra attempts after the first, for idempotent calls only (total = max-retries + 1).
  max-retries: 2
  # Base backoff between retries (milliseconds); grows linearly per attempt.
  retry-backoff-ms: 200

web:
  # Clickable links handed to the player by /web. {token} is substituted with the one-time
  # web-auth token. These URLs must match the web frontend's redeem routes (greenfield contract).
  link-url: "http://localhost:3000/account/set-password?token={token}"
  reset-url: "http://localhost:3000/account/reset-password?token={token}"

health:
  # Backend health check → maintenance lockdown. The plugin polls GET /api/health every
  # interval-seconds; after failure-threshold consecutive failures (404 / transport error / status
  # != UP) it freezes non-bypass players (no move/build/interact/commands/chat) until the backend is
  # healthy again. Staff with the node "mcplatform.maintenance.bypass" stay exempt.
  interval-seconds: 5
  failure-threshold: 2
  # After this many seconds of sustained outage, staff get a clickable recommendation to kick all
  # non-bypass players (/maintenancekick → confirm dialog). The freeze is immediate; only the
  # recommendation is delayed.
  kick-recommendation-after-seconds: 60

redis:
  # Read-only Pub/Sub subscriber for live updates (e.g. mc:economy:balance).
  # The plugin only subscribes here; it never writes to Redis or reads backend-internal keys.
  host: localhost
  port: 6379
  # Leave empty for no AUTH.
  password: ""
