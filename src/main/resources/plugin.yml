name: McPlatformPlugin
version: '${version}'
main: com.mcplatform.plugin.platform.McPlatformPlugin
api-version: '1.21'
author: mc-platform
description: REST/Redis client plugin for the mc-platform backend. Generic feature skeleton.
commands:
  balance:
    description: Shows your COINS balance (live, read from the backend).
    usage: /balance
  pay:
    description: Send COINS to a player. Large amounts require a click-confirm in chat.
    usage: /pay <Spieler> <Betrag>
  transactions:
    description: Open the paginated, filterable transaction history (your own, or another player's).
    usage: /transactions [player]
  menu:
    description: Open the main hub menu.
    usage: /menu
  punish:
    description: Issue a punishment from a template (or list applicable templates).
    usage: /punish <player> [template] [grund]
    permission: mcplatform.punish
  unpunish:
    description: Revoke a punishment by id.
    usage: /unpunish <id> [grund]
    permission: mcplatform.punish.revoke
  history:
    description: Show a player's active punishments.
    usage: /history <player>
    permission: mcplatform.punish.history
  punishments:
    description: Open the paginated punishment history menu for a player.
    usage: /punishments <player>
    permission: mcplatform.punish.history
  punishmenu:
    description: Open the punish menu (pick a target, choose a template).
    usage: /punishmenu [player]
    permission: mcplatform.punish
  warn:
    description: Warn a player.
    usage: /warn <player> [grund]
    permission: mcplatform.punish.warn
  tempban:
    description: Temporarily ban a player.
    usage: /tempban <player> <duration> [grund]
    permission: mcplatform.punish.tempban
  chatban:
    description: Mute a player in chat for a duration.
    usage: /chatban <player> <duration> [grund]
    permission: mcplatform.punish.chatban
  permaban:
    description: Permanently ban a player.
    usage: /permaban <player> [grund]
    permission: mcplatform.punish.permaban
  report:
    description: Report a player (category menu + chat reason). Open to all.
    usage: /report <spieler>
  reports:
    description: Open the team inbox of open reports (LIVE).
    usage: /reports
    permission: mcplatform.report.view
  rank:
    description: Read-only tool to turn the held item into a display_icon string (click-to-copy).
    usage: /rank toDisplayIcon
  ranks:
    description: Open the role management menu (create/edit roles, role permissions).
    usage: /ranks
  cp:
    description: Open the control panel for a player (grant/revoke ranks and permissions).
    usage: /cp <Spieler>
  web:
    description: Manage your web account (create a link, or reset your password).
    usage: /web <link|resetPassword>
  maintenancekick:
    description: During a backend outage — open a confirm dialog to kick all non-staff players.
    usage: /maintenancekick

# Optimistic UI-gate only. The backend is the real authority on who may apply which
# template/action and rejects with 403; these defaults just keep the in-game UX sane.
permissions:
  mcplatform.economy.history.others:
    description: View other players' economy transaction history via /transactions <player>.
    default: op
  mcplatform.punish:
    description: Use /punish and view applicable templates.
    default: op
  mcplatform.punish.revoke:
    description: Use /unpunish.
    default: op
  mcplatform.punish.history:
    description: Use /history.
    default: op
  mcplatform.punish.warn:
    description: Use /warn.
    default: op
  mcplatform.punish.tempban:
    description: Use /tempban.
    default: op
  mcplatform.punish.chatban:
    description: Use /chatban.
    default: op
  mcplatform.punish.permaban:
    description: Use /permaban.
    default: op
  mcplatform.report.view:
    description: See the report inbox and receive live new-report notifications.
    default: op
  mcplatform.report.handle:
    description: Set report status (in progress / resolved / rejected).
    default: op
